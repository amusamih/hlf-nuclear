services:
  postgres:
    image: postgres:16-alpine
    container_name: nuclear-assurance-postgres
    environment:
      POSTGRES_DB: nuclear_assurance
      POSTGRES_USER: prototype
      POSTGRES_PASSWORD: prototype
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    container_name: nuclear-assurance-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: prototype
      MINIO_ROOT_PASSWORD: prototype123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./.data/minio:/data
